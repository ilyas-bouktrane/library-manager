services:
  library-manager-db:
    container_name: "library-manager-db"
    image: postgres:alpine
    restart: unless-stopped
    ports:
      - "8888:5432"
    environment:
      - POSTGRES_DB=lib_db
      - POSTGRES_USER=lib_user
      - POSTGRES_PASSWORD=lib_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
