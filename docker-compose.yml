services:
  db:
    image: postgres:alpine
    container_name: library-manager-db
    restart: always
    environment:
      POSTGRES_USER: lib_user
      POSTGRES_PASSWORD: lib_pass
      POSTGRES_DB: lib_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lib_user -d lib_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    #   image: ghcr.io/ilyas-bouktrane/library-manager:latest
    build: # it's either build or image
      context: .
      dockerfile: Dockerfile
    container_name: library-manager-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://lib_user:lib_pass@db:5432/lib_db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_CRON_SECRET=${EMAIL_CRON_SECRET}
      - RESEND_SENDER_EMAIL=${RESEND_SENDER_EMAIL}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
