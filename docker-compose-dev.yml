services:
  db:
    image: postgres:alpine
    container_name: library-manager-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lib_user
      POSTGRES_PASSWORD: lib_pass
      POSTGRES_DB: lib_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
