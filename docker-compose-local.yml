services:
  db:
    image: postgres:alpine
    container_name: library-manager-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lib_user
      POSTGRES_PASSWORD: lib_pass
      POSTGRES_DB: lib_db
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lib_user -d lib_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_local:
